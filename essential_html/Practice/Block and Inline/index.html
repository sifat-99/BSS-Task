<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Block and Inline</title>
    <style>
        p {
            background-color: #aaa;
            padding: 1rem;
            margin-bottom: 4rem;

        }

        a {
            background-color: #eee;
            padding: 0.5rem;
            margin-right: 5rem;
        }
    </style>
</head>

<body>
    <h1>HTML & CSS Sandbox - Block and Inline</h1>
    <!-- block level element -->
    <p>Lorem ipsum dolor sit.</p>
    <p>Lorem ipsum dolor sit.</p>

    <!-- inline elements -->
    <a href="#">Link 1</a>
    <a href="#">Link 2</a>

    <p>Lorem ipsum dolor sit.</p>



</body>

</html>
