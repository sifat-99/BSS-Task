<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Divs Spans </title>
    <style>

    </style>
</head>

<body>
    <header class="main-header" id="header">
        <h1>My Website</h1>
        <nav class="main-menu">
            <ul class="nav">
                <li><a href="#">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- sections -->
    <section id="about">
        <div class="card text-center">
            <h2 class="text-lg">Section one</h2>
            <p>This is the first Paragraphs in <span class="primary-text">Section one</span></p>
            <p>This is the second Paragraphs in <span class="secondary-text">Section one</span></p>
        </div>
    </section>
    <div id="contact">
        <div class="card text-center">
            <h2 class="text-xl">Section two</h2>
            <p>This is the first Paragraphs in <span class="primary-text">Section two</span></p>
            <p>This is the second Paragraphs in <span class="secondary-text">Section two</span></p>
        </div>
    </div>
    <footer class="footer">&copy; 2026 My Website</footer>


</body>

</html>
