<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Lists</title>
</head>

<body>
    <h1>HTML & CSS Sandbox - Lists</h1>
    <!-- Unordered List -->
    <ul>
        <li>Item one</li>
        <li>Item two</li>
        <li>Item three</li>
    </ul>
    <!-- Ordered list -->
    <ol>
        <li>Item one</li>
        <li>Item two</li>
        <li>Item three</li>
    </ol>
    <!-- Nested list -->
    <ul>
        <li>Item one</li>
        <li>Item two</li>
        <ul>
            <li>Item three</li>
            <li>Item four</li>
        </ul>
        <li>Item five</li>
    </ul>
    <!-- Definition list -->
    <dl>
        <dt>Item 1</dt>
        <dd>Description 1</dd>
        <dt>Item 2</dt>
        <dd>Description 2</dd>
        <dt>Item 3</dt>
        <dd>Description 3</dd>
    </dl>
</body>

</html>
