<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Select box</title>
</head>

<body>
    <h1>Tech Support</h1>
    <form>
        <label for="product">Product</label>
        <br>
        <select name="product" id="product" multiple size="4">
            <option value="iphone">iPhone</option>
            <option value="imac" selected>iMac</option>
            <option value="iPhone">Macbook</option>
            <option value="mackbook-pro">Macbook Pro</option>
        </select>
        <br><br>
        <label for="message">Message</label>
        <br>
        <textarea name="message" id="message" placeholder="Enter your issue" rows="5" cols="40"></textarea>
        <br><br>
        <input type="submit">
    </form>
</body>

</html>
