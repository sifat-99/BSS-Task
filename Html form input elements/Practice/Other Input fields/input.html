<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Other input Type</title>
</head>

<body>
    <h1>HTML & CSS Sandbox - Other input Type</h1>
    <form action="">
        <div>
            <label for="color">Color
                <input type="color" name="color" id="time">
            </label>
        </div>
        <br>
        <div>
            <label for="date">Date
                <input type="date" name="date" id="date">
            </label>
        </div>
        <br>
        <div>
            <label for="time">Time
                <input type="time" id="time" name="time">
            </label>
        </div>
        <br>
        <div>
            <label for="week">Week
                <input type="week" name="week" id="week">
            </label>
        </div>
        <br>
        <div>
            <label for="month">Month
                <input type="month" name="month" id="month">
            </label>
        </div>
        <br>
        <div>
            <label for="range">Range
                <input type="range" name="range" id="range" min="0" max="100" step="5">
            </label>
        </div>
        <br>
        <div>
            <label for="url">Url
                <input type="url" name="url" id="url">
            </label>
        </div>
        <br>
        <input type="submit">
    </form>
</body>

</html>
