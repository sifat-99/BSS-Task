<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Select box</title>
</head>

<body>
    <h1>Favorite programming Language</h1>
    <form>
        <label for="html">
            <input type="checkbox" id="html" name="language" value="html" disabled>HTML
        </label>
        <label for="css">
            <input type="checkbox" id="css" name="language" value="css" checked>CSS
        </label>
        <label for="javascript">
            <input type="checkbox" id="javascript" name="language" value="javascript" checked>Javascript
        </label>
        <!-- <input type="submit"> -->
    </form>

    <!-- for radio input -->
    <h2>Product Size</h2>
    <form>
        <label for="small">
            <input type="radio" name="size" id="small" value="small">Small
        </label>
        <label for="medium">
            <input type="radio" name="size" id="medium" value="medium" checked>Medium
        </label>
        <label for="small">
            <input type="radio" name="size" id="large" value="large">Large
        </label>
    </form>
</body>

</html>
