<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox - Audio</title>
</head>

<body>
    <h1>HTML & CSS Sandbox - Audio</h1>
    <audio src="song.mp3" type="audio/mp3" controls></audio>
    <audio controls>
        <source src="song.mp3" type="audio/mp3" />
        <p>Your browser does not support the audio element</p>
    </audio>
    <!-- <audio src="song.mp3" controls autoplay></audio> -->
    <!-- loop -->
    <!-- <audio src="song.mp3" controls loop autoplay></audio> -->

    <figure>
        <figcaption>Listen to the song:</figcaption>
        <audio src="song.mp3" controls></audio>
        <a href="song.mp3">Download Audio</a>
    </figure>

</body>

</html>
