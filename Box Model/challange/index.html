<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>HTML & CSS Sandbox</title>
</head>

<body>

    <main class="container">
        <div class="card">
            <h1 class="question-header">
                Need to hire a freelancer?
            </h1>
            <p class="message">
                Sign up, type in what you need and revcive free quotes in seconds.
            </p>
            <form>
                <div class="from-group">
                    <input type="text" name="input" placeholder="What do you need done?">
                </div>
                <div class="from-group">
                    <button type="submit">Post a Project</button>
                </div>
            </form>
        </div>
    </main>
